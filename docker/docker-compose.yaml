services:
  model-explorer:
    build: .
    container_name: model-explorer
    volumes:
      - ~/Docker_Share:/data
      - ~/.config/lvim:/root/.config/lvim
      - ~/.ssh:/root/.ssh
      - ./workspace:/workspace
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_USER=${GITHUB_USER}
      - ZSH_DISABLE_COMPFIX=true
      - TERM=xterm-256color
    ports:
      - "8080:8080"
    working_dir: /workspace
    tty: true
    stdin_open: true
    restart: unless-stopped

